name: ci


on:
 pull_request:
  branches: [main]


jobs:
 style:
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: "1.26.0"

    - name: Format Check
      run: test -z $(go fmt ./...)

    - name: Install staticcheck
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Static Check
      run: staticcheck ./...
      
 tests:
  name: Tests
  runs-on: ubuntu-latest

  steps:
   - name: Check Out Code
     uses: actions/checkout@v4

   - name: Set up Go
     uses: actions/setup-go@v5
     with:
       go-version: "1.26.0"

   - name: Test
     run: go test ./... -cover

