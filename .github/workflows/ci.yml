name: ci


on:
 pull_request:
  branches: [main]


jobs:
 style:
  name: Style
  runs-on: ubuntu-latest

 steps:
  - name: Formate Code Proply
    run: test -z $(go fmt ./...)

 tests:
  name: Tests
  runs-on: ubuntu-latest

  steps:
   - name: Check Out Code
     uses: actions/checkout@v4

   - name: Set up Go
     uses: actions/setup-go@v5
     with:
       go-version: "1.26.0"

   - name: Test
     run: go test ./... -cover

